<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پروفایل کاربر</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Tahoma', sans-serif;
            background-color: #f8f9fa;
        }
        .profile-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            border-radius: 10px;
            margin-bottom: 2rem;
        }
        .nav-tabs .nav-link {
            color: #495057;
        }
        .nav-tabs .nav-link.active {
            color: #667eea;
            font-weight: bold;
        }
        .account-card {
            border: 1px solid #dee2e6;
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            background: white;
            transition: all 0.3s;
        }
        .account-card:hover {
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <!-- Header -->
        <div class="profile-header">
            <h2>خوش آمدید، <span th:text="${username}"></span></h2>
            <p>مدیریت حساب‌های بانکی، خرید کالا و خانه</p>
        </div>

        <!-- Navigation Tabs -->
        <ul class="nav nav-tabs mb-4">
            <li class="nav-item">
                <a class="nav-link" th:classappend="${activeTab == 'accounts'} ? 'active' : ''"
                   th:href="@{/profile}">حساب‌های بانکی</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:classappend="${activeTab == 'products'} ? 'active' : ''"
                   th:href="@{/profile/products}">کالاها</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:classappend="${activeTab == 'homes'} ? 'active' : ''"
                   th:href="@{/profile/homes}">خانه‌ها</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:classappend="${activeTab == 'purchases'} ? 'active' : ''"
                   th:href="@{/profile/my-purchases}">خریدهای من</a>
            </li>
        </ul>

        <!-- Alert Messages -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Bank Accounts List -->
        <div class="row">
            <div class="col-12">
                <h4 class="mb-3">حساب‌های بانکی شما</h4>

                <div th:if="${accounts.isEmpty()}" class="alert alert-info">
                    شما هیچ حساب بانکی ندارید.
                </div>

                <div th:each="account : ${accounts}" class="account-card">
                    <div class="row align-items-center">
                        <div class="col-md-3">
                            <strong>شماره حساب:</strong>
                            <p class="mb-0" th:text="${account.accountNumber}"></p>
                        </div>
                        <div class="col-md-3">
                            <strong>موجودی:</strong>
                            <p class="mb-0 text-success" th:text="${#numbers.formatDecimal(account.balance, 0, 'COMMA', 0, 'POINT')} + ' ریال'"></p>
                        </div>
                        <div class="col-md-3">
                            <strong>نوع حساب:</strong>
                            <p class="mb-0" th:text="${account.type}"></p>
                        </div>
                        <div class="col-md-3 text-end">
                            <a th:href="@{/bankAccount/{id}(id=${account.id})}" class="btn btn-sm btn-outline-primary">جزئیات</a>
                        </div>
                    </div>
                </div>

                <!-- Pagination -->
                <nav th:if="${accounts.totalPages > 1}">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:classappend="${accounts.first} ? 'disabled'">
                            <a class="page-link" th:href="@{/profile(page=${accounts.number - 1})}">قبلی</a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(0, accounts.totalPages - 1)}"
                            th:classappend="${i == accounts.number} ? 'active'">
                            <a class="page-link" th:href="@{/profile(page=${i})}" th:text="${i + 1}"></a>
                        </li>
                        <li class="page-item" th:classappend="${accounts.last} ? 'disabled'">
                            <a class="page-link" th:href="@{/profile(page=${accounts.number + 1})}">بعدی</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
