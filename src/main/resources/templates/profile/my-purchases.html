<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>خریدهای من</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: Tahoma; background: #f8f9fa; }
        .purchase-card {
            background: white;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .invoice {
            font-family: 'Courier New';
            font-weight: bold;
            color: #667eea;
        }
        .badge-product { background: #28a745; }
        .badge-home { background: #dc3545; }
    </style>
</head>
<body>
<div class="container mt-4">
    <h2>خریدهای من</h2>

    <div th:if="${successMessage}" class="alert alert-success">
        <span th:text="${successMessage}"></span>
    </div>

    <div th:if="${purchases.isEmpty()}" class="alert alert-info">
        هیچ خریدی ثبت نشده
    </div>

    <div th:each="p : ${purchases}" class="purchase-card">
        <div class="row">
            <div class="col-md-3">
                <strong>شماره فاکتور:</strong>
                <p class="invoice" th:text="${p.invoiceNumber}"></p>
            </div>
            <div class="col-md-3">
                <strong>نوع:</strong>
                <span class="badge"
                      th:classappend="${p.purchaseType == 'PRODUCT'} ? 'badge-product' : 'badge-home'"
                      th:text="${p.purchaseType == 'PRODUCT'} ? 'کالا' : 'خانه'">
                    </span>
            </div>
            <div class="col-md-3">
                <strong>نام:</strong>
                <p th:text="${p.itemName}"></p>
            </div>
            <div class="col-md-3">
                <strong>قیمت:</strong>
                <p class="text-success" th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' ریال'"></p>
            </div>
        </div>
        <small class="text-muted" th:text="'تاریخ: ' + ${#temporals.format(p.purchasedAt, 'yyyy-MM-dd HH:mm')}"></small>
    </div>

    <a href="/profile" class="btn btn-secondary mt-3">بازگشت</a>
</div>
</body>
</html>
