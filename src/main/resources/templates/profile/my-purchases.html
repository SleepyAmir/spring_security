<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خریدهای من</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Tahoma', sans-serif;
            background-color: #f8f9fa;
        }
        .profile-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            border-radius: 10px;
            margin-bottom: 2rem;
        }
        .purchase-card {
            border: 1px solid #dee2e6;
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            background: white;
        }
        .invoice-number {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <!-- Header -->
        <div class="profile-header">
            <h2>خوش آمدید، <span th:text="${username}"></span></h2>
            <p>لیست خریدهای انجام شده</p>
        </div>

        <!-- Navigation Tabs -->
        <ul class="nav nav-tabs mb-4">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/profile}">حساب‌های بانکی</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/profile/products}">کالاها</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/profile/homes}">خانه‌ها</a>
            </li>
            <li class="nav-item">
                <a class="nav-link active" th:href="@{/profile/my-purchases}">خریدهای من</a>
            </li>
        </ul>

        <!-- Purchases List -->
        <div class="row">
            <div class="col-12">
                <h4 class="mb-3">تاریخچه خریدها</h4>
                
                <div th:if="${purchases.isEmpty()}" class="alert alert-info">
                    شما هنوز هیچ خریدی انجام نداده‌اید.
                </div>

                <div th:each="purchase : ${purchases}" class="purchase-card">
                    <div class="row">
                        <div class="col-md-3">
                            <strong>شماره فاکتور:</strong>
                            <p class="invoice-number mb-0" th:text="${purchase.invoiceNumber}"></p>
                        </div>
                        <div class="col-md-3">
                            <strong>تاریخ خرید:</strong>
                            <p class="mb-0" th:text="${#temporals.format(purchase.purchasedAt, 'yyyy-MM-dd HH:mm')}"></p>
                        </div>
                        <div class="col-md-3">
                            <strong>وضعیت:</strong>
                            <p class="mb-0">
                                <span class="badge" 
                                      th:classappend="${purchase.status == T(com.mftplus.spring_security.purchase.model.enums.PurchaseStatus).COMPLETED} ? 'bg-success' :
                                                       ${purchase.status == T(com.mftplus.spring_security.purchase.model.enums.PurchaseStatus).FAILED} ? 'bg-danger' : 'bg-warning'"
                                      th:text="${purchase.status}">
                                </span>
                            </p>
                        </div>
                        <div class="col-md-3 text-end">
                            <a th:href="@{/profile/my-purchases/{id}(id=${purchase.id})}" class="btn btn-sm btn-outline-primary">جزئیات</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
