<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خریدهای من</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--bg0:#080C16;--bg1:#0D1120;--bg2:#111827;--bg3:#161F30;--glass:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.07);--border2:rgba(99,179,237,0.22);--blue:#3B82F6;--blue2:#60A5FA;--green:#10B981;--yellow:#F59E0B;--red:#EF4444;--t1:#EFF6FF;--t2:#94A3B8;--t3:#4B5675;--g1:linear-gradient(135deg,#1D4ED8,#2563EB);--sh:0 4px 24px rgba(0,0,0,0.5);--shb:0 4px 16px rgba(59,130,246,0.32);--r:14px;--rs:8px;--tr:all 0.25s cubic-bezier(0.4,0,0.2,1);}
        *{box-sizing:border-box;}
        body{font-family:'Vazirmatn',sans-serif;background:var(--bg0);color:var(--t1);direction:rtl;text-align:right;min-height:100vh;background-image:radial-gradient(ellipse at 15% 40%,rgba(59,130,246,0.05) 0%,transparent 55%);}
        .top-bar{background:rgba(8,12,22,0.96);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);height:60px;display:flex;align-items:center;padding:0 1.5rem;position:sticky;top:0;z-index:100;}
        .top-bar-brand{font-weight:800;font-size:1rem;color:var(--t1);display:flex;align-items:center;gap:0.6rem;text-decoration:none;}
        .brand-logo{width:32px;height:32px;background:var(--g1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.85rem;color:white;}
        .top-bar-back{display:flex;align-items:center;gap:0.4rem;font-size:0.835rem;font-weight:500;color:var(--t3);text-decoration:none;margin-right:auto;padding:0.35rem 0.75rem;border:1px solid var(--border);border-radius:var(--rs);transition:var(--tr);}
        .top-bar-back:hover{color:var(--t1);border-color:var(--border2);}
        .page-wrap{max-width:1000px;margin:0 auto;padding:2rem 1.5rem;animation:fadeInUp 0.35s ease forwards;}
        .page-header{display:flex;align-items:center;gap:0.6rem;margin-bottom:1.75rem;}
        .page-title{font-size:1.35rem;font-weight:800;color:var(--t1);letter-spacing:-0.02em;display:flex;align-items:center;gap:0.6rem;}
        .title-icon{width:38px;height:38px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.22);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;color:var(--blue);}
        .alert{border-radius:var(--r);border:1px solid;font-size:0.875rem;font-weight:500;padding:0.875rem 1rem;display:flex;align-items:center;gap:0.5rem;margin-bottom:1.25rem;}
        .alert-success{background:rgba(16,185,129,0.1);border-color:rgba(16,185,129,0.25);color:#34D399;}
        .alert-info{background:rgba(6,182,212,0.1);border-color:rgba(6,182,212,0.25);color:#22D3EE;}
        .p-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem 1.5rem;margin-bottom:0.875rem;transition:var(--tr);}
        .p-card:hover{border-color:var(--border2);}
        .p-row{display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;}
        .invoice-num{font-family:'Courier New',monospace;font-weight:700;color:var(--blue2);font-size:0.9rem;letter-spacing:0.02em;}
        .badge{font-family:'Vazirmatn',sans-serif;font-weight:600;font-size:0.72rem;padding:0.3rem 0.7rem;border-radius:20px;}
        .badge-product{background:rgba(16,185,129,0.12);color:#10B981;border:1px solid rgba(16,185,129,0.25);}
        .badge-home{background:rgba(99,102,241,0.12);color:#818CF8;border:1px solid rgba(99,102,241,0.25);}
        .item-name{font-size:0.9rem;font-weight:600;color:var(--t1);}
        .item-price{font-size:1rem;font-weight:800;color:var(--green);}
        .item-date{font-size:0.8rem;color:var(--t3);margin-top:0.35rem;}
        .btn{font-family:'Vazirmatn',sans-serif;font-weight:600;border-radius:var(--rs);font-size:0.875rem;transition:var(--tr);border:none;cursor:pointer;display:inline-flex;align-items:center;gap:0.4rem;text-decoration:none;padding:0.6rem 1.25rem;}
        .btn-secondary{background:var(--glass);color:var(--t2);border:1px solid var(--border);}
        .btn-secondary:hover{background:var(--bg3);color:var(--t1);transform:translateY(-1px);}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
    </style>
</head>
<body>
<div class="top-bar">
    <a class="top-bar-brand" href="/dashboard"><div class="brand-logo"><i class="bi bi-shield-fill-check"></i></div> سیستم مدیریت</a>
    <a href="/profile" class="top-bar-back"><i class="bi bi-arrow-right"></i> پروفایل</a>
</div>
<div class="page-wrap">
    <div class="page-header">
        <div class="page-title">
            <div class="title-icon"><i class="bi bi-receipt"></i></div>
            خریدهای من
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success">
        <i class="bi bi-check-circle-fill"></i><span th:text="${successMessage}"></span>
    </div>

    <div th:if="${purchases.isEmpty()}" class="alert alert-info">
        <i class="bi bi-info-circle-fill"></i> هیچ خریدی ثبت نشده است.
    </div>

    <div th:each="p : ${purchases}" class="p-card">
        <div class="p-row">
            <div style="flex:1;min-width:140px;">
                <div style="font-size:0.75rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.3rem;">شماره فاکتور</div>
                <div class="invoice-num" th:text="${p.invoiceNumber}"></div>
            </div>
            <div style="min-width:80px;">
                <span class="badge"
                      th:classappend="${p.purchaseType == 'PRODUCT'} ? 'badge-product' : 'badge-home'"
                      th:text="${p.purchaseType == 'PRODUCT'} ? 'کالا' : 'خانه'"></span>
            </div>
            <div style="flex:2;min-width:140px;">
                <div style="font-size:0.75rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.3rem;">نام</div>
                <div class="item-name" th:text="${p.itemName}"></div>
            </div>
            <div style="min-width:140px;text-align:left;">
                <div style="font-size:0.75rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.3rem;">مبلغ</div>
                <div class="item-price" th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' ریال'"></div>
            </div>
        </div>
        <div class="item-date" th:text="'تاریخ: ' + ${#temporals.format(p.purchasedAt, 'yyyy-MM-dd HH:mm')}"></div>
    </div>

    <a href="/profile" class="btn btn-secondary" style="margin-top:0.5rem;">
        <i class="bi bi-arrow-right"></i> بازگشت به پروفایل
    </a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
