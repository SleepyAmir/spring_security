<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout (content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title != null ? title + ' - ' : ''} + 'سیستم مدیریت'">سیستم مدیریت</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg0: #080C16;
            --bg1: #0D1120;
            --bg2: #111827;
            --bg3: #161F30;
            --glass: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.07);
            --border2: rgba(99,179,237,0.22);
            --blue: #3B82F6;
            --blue2: #60A5FA;
            --green: #10B981;
            --yellow: #F59E0B;
            --red: #EF4444;
            --cyan: #06B6D4;
            --t1: #EFF6FF;
            --t2: #94A3B8;
            --t3: #4B5675;
            --g1: linear-gradient(135deg, #1D4ED8, #2563EB);
            --sh: 0 4px 24px rgba(0,0,0,0.5);
            --shb: 0 4px 16px rgba(59,130,246,0.32);
            --r: 14px;
            --rs: 8px;
            --tr: all 0.25s cubic-bezier(0.4,0,0.2,1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background: var(--bg0);
            color: var(--t1);
            direction: rtl;
            text-align: right;
            min-height: 100vh;
            background-image:
                    radial-gradient(ellipse at 15% 40%, rgba(59,130,246,0.05) 0%, transparent 55%),
                    radial-gradient(ellipse at 85% 10%, rgba(99,102,241,0.04) 0%, transparent 50%);
        }

        /* ─── HEADER ─── */
        .site-header {
            position: sticky;
            top: 0;
            z-index: 999;
            height: 60px;
            background: rgba(8,12,22,0.97);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            gap: 1rem;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
            flex-shrink: 0;
        }

        .header-logo {
            width: 34px; height: 34px;
            background: var(--g1);
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem;
            color: white;
            box-shadow: var(--shb);
        }

        .header-title {
            font-weight: 800;
            font-size: 1rem;
            color: var(--t1);
            letter-spacing: -0.02em;
        }

        .header-divider {
            width: 1px;
            height: 24px;
            background: var(--border);
            flex-shrink: 0;
        }

        .header-nav {
            display: flex;
            align-items: center;
            gap: 0.1rem;
            flex: 1;
        }

        .header-link {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.45rem 0.875rem;
            border-radius: var(--rs);
            color: var(--t3);
            text-decoration: none;
            font-size: 0.845rem;
            font-weight: 500;
            transition: var(--tr);
            white-space: nowrap;
        }

        .header-link i { font-size: 0.9rem; }

        .header-link:hover {
            color: var(--t1);
            background: var(--glass);
        }

        .header-link.active {
            color: var(--blue2);
            background: rgba(59,130,246,0.1);
        }

        .header-user {
            margin-right: auto;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.35rem 0.875rem 0.35rem 0.5rem;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            flex-shrink: 0;
        }

        .user-dot {
            width: 28px; height: 28px;
            background: var(--g1);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem;
            color: white;
        }

        .user-name {
            font-size: 0.835rem;
            font-weight: 600;
            color: var(--t2);
        }

        .header-logout {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.875rem;
            border-radius: var(--rs);
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.18);
            color: #F87171;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 0.835rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--tr);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .header-logout:hover {
            background: rgba(239,68,68,0.15);
            border-color: rgba(239,68,68,0.35);
            color: #F87171;
        }

        /* ─── MOBILE MENU ─── */
        .mobile-menu-btn {
            display: none;
            background: var(--glass);
            border: 1px solid var(--border);
            color: var(--t2);
            border-radius: var(--rs);
            width: 36px; height: 36px;
            align-items: center; justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            flex-shrink: 0;
        }

        .mobile-nav {
            display: none;
            position: fixed;
            top: 60px; left: 0; right: 0;
            background: rgba(8,12,22,0.98);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1rem;
            flex-direction: column;
            gap: 0.25rem;
            z-index: 998;
        }

        .mobile-nav.open { display: flex; }
        .mobile-nav .header-link { padding: 0.6rem 0.875rem; }

        @media (max-width: 767px) {
            .header-nav { display: none; }
            .header-user { display: none; }
            .header-logout { display: none; }
            .mobile-menu-btn { display: flex; }
            .header-divider { display: none; }
        }

        /* ─── MAIN ─── */
        .main-content {
            padding: 2rem;
            min-height: calc(100vh - 60px);
        }

        /* ─── CARDS ─── */
        .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); box-shadow: var(--sh); overflow: hidden; }
        .card-header { background: var(--glass); border-bottom: 1px solid var(--border); padding: 1.2rem 1.5rem; }
        .card-body { padding: 1.5rem; }

        /* ─── ALERTS ─── */
        .alert { border-radius: var(--r); border: 1px solid; font-size: 0.875rem; font-weight: 500; padding: 0.875rem 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .alert-success { background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.25); color: #34D399; }
        .alert-danger  { background: rgba(239,68,68,0.1);  border-color: rgba(239,68,68,0.25);  color: #F87171; }
        .alert-warning { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.25); color: #FCD34D; }
        .alert-info    { background: rgba(6,182,212,0.1);  border-color: rgba(6,182,212,0.25);  color: #22D3EE; }
        .btn-close { filter: invert(1) brightness(0.5); cursor: pointer; }

        /* ─── BUTTONS ─── */
        .btn { font-family: 'Vazirmatn',sans-serif; font-weight: 600; border-radius: var(--rs); font-size: 0.875rem; transition: var(--tr); border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 0.4rem; text-decoration: none; padding: 0.6rem 1.25rem; }
        .btn-primary { background: var(--g1); color: white; box-shadow: var(--shb); }
        .btn-primary:hover { transform: translateY(-2px); color: white; filter: brightness(1.1); box-shadow: 0 8px 28px rgba(59,130,246,0.45); }
        .btn-secondary { background: var(--glass); color: var(--t2); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--bg3); color: var(--t1); transform: translateY(-1px); }
        .btn-success { background: linear-gradient(135deg,#065F46,#059669); color: white; box-shadow: 0 4px 16px rgba(16,185,129,0.22); }
        .btn-success:hover { transform: translateY(-2px); color: white; filter: brightness(1.1); }
        .btn-warning { background: linear-gradient(135deg,#92400E,#D97706); color: white; }
        .btn-warning:hover { transform: translateY(-2px); color: white; }
        .btn-danger { background: linear-gradient(135deg,#7F1D1D,#DC2626); color: white; }
        .btn-danger:hover { transform: translateY(-2px); color: white; }
        .btn-info { background: linear-gradient(135deg,#0E4F63,#0891B2); color: white; }
        .btn-info:hover { transform: translateY(-2px); color: white; }
        .btn-outline-primary { border: 1px solid rgba(59,130,246,0.4); color: var(--blue); background: transparent; }
        .btn-outline-primary:hover { background: rgba(59,130,246,0.1); color: var(--blue2); }
        .btn-lg { padding: 0.875rem 1.75rem; font-size: 1rem; border-radius: 10px; }
        .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.8rem; }
        .btn:disabled, .btn[disabled] { opacity: 0.5; cursor: not-allowed; transform: none !important; }

        /* ─── FORMS ─── */
        .form-control, .form-select { background: var(--bg1); border: 1px solid var(--border); border-radius: var(--rs); color: var(--t1); font-family: 'Vazirmatn',sans-serif; font-size: 0.9rem; padding: 0.7rem 1rem; transition: var(--tr); width: 100%; }
        .form-control:focus, .form-select:focus { background: var(--bg2); border-color: var(--blue); color: var(--t1); box-shadow: 0 0 0 3px rgba(59,130,246,0.14); outline: none; }
        .form-control::placeholder { color: var(--t3); }
        .form-label { font-size: 0.845rem; font-weight: 600; color: var(--t2); margin-bottom: 0.45rem; display: block; }
        .form-select option { background: var(--bg2); color: var(--t1); }
        .input-group-text { background: var(--bg1); border: 1px solid var(--border); color: var(--t3); }
        .form-check-input { background-color: var(--bg1); border-color: var(--border); }
        .form-check-input:checked { background-color: var(--blue); border-color: var(--blue); }
        .form-check-label { color: var(--t2); font-size: 0.9rem; }

        /* ─── TABLES ─── */
        .table { color: var(--t1); border-color: transparent; margin: 0; }
        .table thead th { background: rgba(255,255,255,0.03); color: var(--t3); font-weight: 700; font-size: 0.77rem; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); padding: 0.875rem 1rem; white-space: nowrap; }
        .table tbody td { border-bottom: 1px solid rgba(255,255,255,0.03); padding: 0.875rem 1rem; font-size: 0.875rem; vertical-align: middle; color: var(--t2); }
        .table-striped tbody tr:nth-of-type(odd) td { background: rgba(255,255,255,0.015); }
        .table-hover tbody tr:hover td { background: rgba(59,130,246,0.06) !important; color: var(--t1); }
        .table-responsive { border-radius: 0 0 var(--r) var(--r); }

        /* ─── BADGES ─── */
        .badge { font-family: 'Vazirmatn',sans-serif; font-weight: 600; font-size: 0.72rem; padding: 0.35rem 0.75rem; border-radius: 20px; }
        .bg-success { background: rgba(16,185,129,0.12) !important; color: #10B981 !important; border: 1px solid rgba(16,185,129,0.25); }
        .bg-danger  { background: rgba(239,68,68,0.12)  !important; color: #EF4444 !important; border: 1px solid rgba(239,68,68,0.25); }
        .bg-primary { background: rgba(59,130,246,0.12) !important; color: #3B82F6 !important; border: 1px solid rgba(59,130,246,0.25); }
        .bg-warning { background: rgba(245,158,11,0.12) !important; color: #F59E0B !important; border: 1px solid rgba(245,158,11,0.25); }
        .bg-info    { background: rgba(6,182,212,0.12)  !important; color: #06B6D4 !important; border: 1px solid rgba(6,182,212,0.25); }

        /* ─── PAGE HEADER ─── */
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.75rem; }
        .page-title { font-size: 1.35rem; font-weight: 800; color: var(--t1); display: flex; align-items: center; gap: 0.6rem; letter-spacing: -0.02em; }
        .title-icon { width: 38px; height: 38px; background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.22); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1rem; color: var(--blue); }

        /* ─── MISC ─── */
        .text-muted    { color: var(--t3) !important; }
        .text-secondary{ color: var(--t2) !important; }
        .text-success  { color: var(--green) !important; }
        .text-danger   { color: var(--red) !important; }
        .text-warning  { color: var(--yellow) !important; }
        .text-primary  { color: var(--blue) !important; }
        .gap-2 { gap: 0.5rem; }
        .mb-3 { margin-bottom: 1rem; }
        .mt-3 { margin-top: 1rem; }

        /* ─── PROFILE COMPONENTS ─── */
        .hero { background: linear-gradient(135deg,rgba(29,78,216,0.18) 0%,rgba(37,99,235,0.08) 100%); border: 1px solid rgba(59,130,246,0.18); border-radius: 18px; padding: 1.75rem 2rem; margin-bottom: 2rem; position: relative; overflow: hidden; }
        .hero::before { content: ""; position: absolute; top: -30px; left: -30px; width: 120px; height: 120px; background: rgba(59,130,246,0.08); border-radius: 50%; }
        .hero-label { font-size: 0.75rem; font-weight: 700; color: rgba(96,165,250,0.7); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.35rem; position: relative; }
        .hero-title { font-size: 1.5rem; font-weight: 800; color: var(--t1); letter-spacing: -0.03em; position: relative; }
        .hero-sub { font-size: 0.875rem; color: var(--t3); margin-top: 0.25rem; position: relative; }

        .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 1.75rem; overflow-x: auto; }
        .tab-link { display: flex; align-items: center; gap: 0.4rem; padding: 0.75rem 1.25rem; font-size: 0.845rem; font-weight: 600; color: var(--t3); text-decoration: none; border-bottom: 2px solid transparent; transition: var(--tr); white-space: nowrap; }
        .tab-link:hover { color: var(--t2); }
        .tab-link.active { color: var(--blue2); border-bottom-color: var(--blue); }

        .account-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 1.25rem 1.5rem; margin-bottom: 0.875rem; transition: var(--tr); display: flex; align-items: center; gap: 1.25rem; flex-wrap: wrap; }
        .account-card:hover { border-color: var(--border2); transform: translateY(-2px); }
        .account-icon { width: 48px; height: 48px; background: linear-gradient(135deg,rgba(29,78,216,0.2),rgba(37,99,235,0.1)); border: 1px solid rgba(59,130,246,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; color: var(--blue); flex-shrink: 0; }

        .section-title { font-size: 1rem; font-weight: 700; color: var(--t1); margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.5rem; }

        .pagination { display: flex; gap: 0.35rem; justify-content: center; margin-top: 1.5rem; padding: 0; list-style: none; }
        .page-item .page-link { display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; color: var(--t2); font-size: 0.875rem; text-decoration: none; transition: var(--tr); }
        .page-item.active .page-link, .page-item .page-link:hover { background: var(--blue); border-color: var(--blue); color: white; }
        .page-item.disabled .page-link { opacity: 0.4; cursor: default; pointer-events: none; }

        .product-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 1.5rem; transition: var(--tr); display: flex; flex-direction: column; gap: 0.75rem; }
        .product-card:hover { border-color: var(--border2); transform: translateY(-4px); box-shadow: 0 16px 48px rgba(0,0,0,0.4); }

        .home-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 1.5rem; margin-bottom: 1rem; transition: var(--tr); display: flex; gap: 1.5rem; flex-wrap: wrap; }
        .home-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
        .spec-chip { display: inline-flex; align-items: center; gap: 0.3rem; background: var(--glass); border: 1px solid var(--border); border-radius: 6px; padding: 0.25rem 0.6rem; font-size: 0.78rem; color: var(--t2); }
        .specs-row { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.75rem; }
        .badge-available { background: rgba(16,185,129,0.12); color: #10B981; border: 1px solid rgba(16,185,129,0.25); }
        .badge-reserved  { background: rgba(245,158,11,0.12); color: #F59E0B; border: 1px solid rgba(245,158,11,0.25); }
        .badge-sold      { background: rgba(239,68,68,0.12);  color: #EF4444; border: 1px solid rgba(239,68,68,0.25); }
        .badge-product   { background: rgba(16,185,129,0.12); color: #10B981; border: 1px solid rgba(16,185,129,0.25); }
        .badge-home      { background: rgba(99,102,241,0.12); color: #818CF8; border: 1px solid rgba(99,102,241,0.25); }

        .purchase-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 1.25rem 1.5rem; margin-bottom: 0.875rem; transition: var(--tr); }
        .purchase-card:hover { border-color: var(--border2); }
        .invoice-num { font-family: 'Courier New',monospace; font-weight: 700; color: var(--blue2); font-size: 0.9rem; }

        .purchase-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 2rem; box-shadow: var(--sh); max-width: 580px; margin: 0 auto; }
        .info-block { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .price-big { font-size: 2rem; font-weight: 800; color: var(--green); letter-spacing: -0.03em; }
        .purchase-title { font-size: 1.3rem; font-weight: 800; color: var(--t1); text-align: center; margin-bottom: 1.5rem; }
        .btn-grid { display: grid; gap: 0.75rem; margin-top: 1.25rem; }

        /* ─── ANIMATION ─── */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
        .main-content > * { animation: fadeInUp 0.35s ease forwards; }
    </style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header class="site-header">
    <a class="header-brand" href="/dashboard">
        <div class="header-logo"><i class="bi bi-shield-fill-check"></i></div>
        <span class="header-title">سیستم مدیریت</span>
    </a>

    <div class="header-divider"></div>

    <nav class="header-nav">
        <a class="header-link" href="/dashboard"><i class="bi bi-house-fill"></i> داشبورد</a>
        <a class="header-link" href="/persons"><i class="bi bi-people-fill"></i> اشخاص</a>
        <a class="header-link" href="/simcards"><i class="bi bi-sim-fill"></i> سیم‌کارت‌ها</a>
        <a class="header-link" href="/profile"><i class="bi bi-person-circle"></i> پروفایل</a>
    </nav>

    <div class="header-user">
        <div class="user-dot"><i class="bi bi-person-fill" style="font-size:0.75rem;"></i></div>
        <span class="user-name" sec:authentication="name">کاربر</span>
    </div>

    <form th:action="@{/logout}" method="post" style="margin:0;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="header-logout">
            <i class="bi bi-box-arrow-right"></i> خروج
        </button>
    </form>

    <!-- Mobile toggle -->
    <button class="mobile-menu-btn" onclick="document.getElementById('mobileNav').classList.toggle('open')">
        <i class="bi bi-list"></i>
    </button>
</header>

<!-- Mobile nav -->
<nav class="mobile-nav" id="mobileNav">
    <a class="header-link" href="/dashboard" onclick="this.closest('.mobile-nav').classList.remove('open')"><i class="bi bi-house-fill"></i> داشبورد</a>
    <a class="header-link" href="/persons" onclick="this.closest('.mobile-nav').classList.remove('open')"><i class="bi bi-people-fill"></i> اشخاص</a>
    <a class="header-link" href="/simcards" onclick="this.closest('.mobile-nav').classList.remove('open')"><i class="bi bi-sim-fill"></i> سیم‌کارت‌ها</a>
    <a class="header-link" href="/profile" onclick="this.closest('.mobile-nav').classList.remove('open')"><i class="bi bi-person-circle"></i> پروفایل</a>
    <div style="border-top:1px solid var(--border);margin:0.5rem 0;"></div>
    <form th:action="@{/logout}" method="post" style="margin:0;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="header-logout" style="width:100%;">
            <i class="bi bi-box-arrow-right"></i> خروج
        </button>
    </form>
</nav>

<!-- ═══ CONTENT ═══ -->
<main class="main-content">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-4">
        <i class="bi bi-check-circle-fill"></i> <span th:text="${success}"></span>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mb-4">
        <i class="bi bi-exclamation-circle-fill"></i> <span th:text="${error}"></span>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show mb-4">
        <i class="bi bi-check-circle-fill"></i> <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
    </div>
    <div th:replace="${content}"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Highlight active nav link
    const p = window.location.pathname;
    document.querySelectorAll('.header-link, .mobile-nav .header-link').forEach(a => {
        if (a.getAttribute('href') === p || (p.startsWith(a.getAttribute('href')) && a.getAttribute('href') !== '/')) {
            a.classList.add('active');
        }
    });
    // Close mobile nav on outside click
    document.addEventListener('click', e => {
        const nav = document.getElementById('mobileNav');
        if (nav && nav.classList.contains('open') && !nav.contains(e.target) && !e.target.closest('.mobile-menu-btn')) {
            nav.classList.remove('open');
        }
    });
</script>
</body>
</html>
