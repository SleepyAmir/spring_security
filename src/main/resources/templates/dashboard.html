<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout(~{::content})}">
<body>
<div th:fragment="content">
    <div class="page-header">
        <div class="page-title">
            <div class="title-icon"><i class="bi bi-speedometer2"></i></div>
            داشبورد
        </div>
    </div>

    <!-- Welcome Banner -->
    <div style="background:linear-gradient(135deg,rgba(29,78,216,0.2) 0%,rgba(37,99,235,0.1) 100%); border:1px solid rgba(59,130,246,0.2); border-radius:16px; padding:1.75rem 2rem; margin-bottom:1.75rem; position:relative; overflow:hidden;">
        <div style="position:absolute;top:-20px;left:-20px;width:120px;height:120px;background:rgba(59,130,246,0.08);border-radius:50%;"></div>
        <div style="position:absolute;bottom:-30px;right:40px;width:80px;height:80px;background:rgba(99,102,241,0.06);border-radius:50%;"></div>
        <div style="position:relative;">
            <div style="font-size:0.8rem;font-weight:600;color:rgba(96,165,250,0.8);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.4rem;">خوش آمدید</div>
            <div style="font-size:1.6rem;font-weight:800;color:#EFF6FF;letter-spacing:-0.03em;" th:text="'سلام، ' + ${username} + '!'">سلام، کاربر!</div>
            <div style="font-size:0.875rem;color:#94A3B8;margin-top:0.25rem;">امروز چه کاری می‌توانم برایتان انجام دهم؟</div>
        </div>
    </div>

    <!-- Stat Cards -->
    <div class="row g-4">
        <div class="col-md-4">
            <div style="background:#111827;border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:1.5rem;transition:all 0.25s;cursor:pointer;position:relative;overflow:hidden;"
                 onmouseover="this.style.transform='translateY(-4px)';this.style.borderColor='rgba(59,130,246,0.3)';this.style.boxShadow='0 12px 40px rgba(0,0,0,0.4)'"
                 onmouseout="this.style.transform='';this.style.borderColor='rgba(255,255,255,0.07)';this.style.boxShadow=''">
                <div style="position:absolute;top:-15px;left:-15px;width:80px;height:80px;background:rgba(59,130,246,0.07);border-radius:50%;"></div>
                <div style="display:flex;align-items:flex-start;justify-content:space-between;position:relative;">
                    <div>
                        <div style="font-size:0.75rem;font-weight:700;color:#4B5675;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.75rem;">مدیریت اشخاص</div>
                        <div style="font-size:1.1rem;font-weight:700;color:#EFF6FF;margin-bottom:0.5rem;">لیست اشخاص</div>
                        <div style="font-size:0.82rem;color:#94A3B8;">مشاهده و ویرایش اشخاص ثبت شده</div>
                    </div>
                    <div style="width:44px;height:44px;background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.22);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:#3B82F6;flex-shrink:0;">
                        <i class="bi bi-people-fill"></i>
                    </div>
                </div>
                <a href="/persons" style="display:inline-flex;align-items:center;gap:0.4rem;margin-top:1.25rem;font-size:0.835rem;font-weight:600;color:#3B82F6;text-decoration:none;transition:gap 0.2s;"
                   onmouseover="this.style.gap='0.6rem'" onmouseout="this.style.gap='0.4rem'">
                    مشاهده <i class="bi bi-arrow-left"></i>
                </a>
            </div>
        </div>

        <div class="col-md-4">
            <div style="background:#111827;border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:1.5rem;transition:all 0.25s;cursor:pointer;position:relative;overflow:hidden;"
                 onmouseover="this.style.transform='translateY(-4px)';this.style.borderColor='rgba(16,185,129,0.3)';this.style.boxShadow='0 12px 40px rgba(0,0,0,0.4)'"
                 onmouseout="this.style.transform='';this.style.borderColor='rgba(255,255,255,0.07)';this.style.boxShadow=''">
                <div style="position:absolute;top:-15px;left:-15px;width:80px;height:80px;background:rgba(16,185,129,0.07);border-radius:50%;"></div>
                <div style="display:flex;align-items:flex-start;justify-content:space-between;position:relative;">
                    <div>
                        <div style="font-size:0.75rem;font-weight:700;color:#4B5675;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.75rem;">مدیریت سیم‌کارت</div>
                        <div style="font-size:1.1rem;font-weight:700;color:#EFF6FF;margin-bottom:0.5rem;">سیم‌کارت‌ها</div>
                        <div style="font-size:0.82rem;color:#94A3B8;">مدیریت و پیگیری سیم‌کارت‌های سازمان</div>
                    </div>
                    <div style="width:44px;height:44px;background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.22);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:#10B981;flex-shrink:0;">
                        <i class="bi bi-sim-fill"></i>
                    </div>
                </div>
                <a href="/simcards" style="display:inline-flex;align-items:center;gap:0.4rem;margin-top:1.25rem;font-size:0.835rem;font-weight:600;color:#10B981;text-decoration:none;transition:gap 0.2s;"
                   onmouseover="this.style.gap='0.6rem'" onmouseout="this.style.gap='0.4rem'">
                    مشاهده <i class="bi bi-arrow-left"></i>
                </a>
            </div>
        </div>

        <div class="col-md-4">
            <div style="background:#111827;border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:1.5rem;transition:all 0.25s;cursor:pointer;position:relative;overflow:hidden;"
                 onmouseover="this.style.transform='translateY(-4px)';this.style.borderColor='rgba(6,182,212,0.3)';this.style.boxShadow='0 12px 40px rgba(0,0,0,0.4)'"
                 onmouseout="this.style.transform='';this.style.borderColor='rgba(255,255,255,0.07)';this.style.boxShadow=''">
                <div style="position:absolute;top:-15px;left:-15px;width:80px;height:80px;background:rgba(6,182,212,0.07);border-radius:50%;"></div>
                <div style="display:flex;align-items:flex-start;justify-content:space-between;position:relative;">
                    <div>
                        <div style="font-size:0.75rem;font-weight:700;color:#4B5675;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.75rem;">حساب کاربری</div>
                        <div style="font-size:1.1rem;font-weight:700;color:#EFF6FF;margin-bottom:0.5rem;">پروفایل من</div>
                        <div style="font-size:0.82rem;color:#94A3B8;">مشاهده حساب‌های بانکی و خریدها</div>
                    </div>
                    <div style="width:44px;height:44px;background:rgba(6,182,212,0.12);border:1px solid rgba(6,182,212,0.22);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:#06B6D4;flex-shrink:0;">
                        <i class="bi bi-person-circle"></i>
                    </div>
                </div>
                <a href="/profile" style="display:inline-flex;align-items:center;gap:0.4rem;margin-top:1.25rem;font-size:0.835rem;font-weight:600;color:#06B6D4;text-decoration:none;transition:gap 0.2s;"
                   onmouseover="this.style.gap='0.6rem'" onmouseout="this.style.gap='0.4rem'">
                    مشاهده <i class="bi bi-arrow-left"></i>
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
