<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::content})}">
<body>
<div th:fragment="content">
    <div class="page-header">
        <div class="page-title">
            <div class="title-icon"><i class="bi bi-person-plus-fill"></i></div>
            افزودن شخص جدید
        </div>
        <a href="/persons" class="btn btn-secondary">
            <i class="bi bi-arrow-right"></i> بازگشت
        </a>
    </div>

    <div class="card">
        <div class="card-header" style="display:flex;align-items:center;gap:0.5rem;">
            <i class="bi bi-info-circle" style="color:var(--blue);"></i>
            <span style="font-size:0.875rem;font-weight:600;color:var(--t2);">اطلاعات شخص را وارد کنید</span>
        </div>
        <div class="card-body">
            <form th:action="@{/persons/create}" th:object="${person}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="row g-4">
                    <div class="col-md-6">
                        <label class="form-label">نام <span style="color:var(--red);">*</span></label>
                        <input type="text" class="form-control" id="firstName" th:field="*{firstName}" placeholder="نام را وارد کنید" required>
                        <div th:if="${#fields.hasErrors('firstName')}" style="margin-top:0.35rem;font-size:0.8rem;color:var(--red);">
                            <i class="bi bi-exclamation-circle"></i> <small th:errors="*{firstName}"></small>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">نام خانوادگی <span style="color:var(--red);">*</span></label>
                        <input type="text" class="form-control" id="lastName" th:field="*{lastName}" placeholder="نام خانوادگی را وارد کنید" required>
                        <div th:if="${#fields.hasErrors('lastName')}" style="margin-top:0.35rem;font-size:0.8rem;color:var(--red);">
                            <i class="bi bi-exclamation-circle"></i> <small th:errors="*{lastName}"></small>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">کد ملی <span style="color:var(--red);">*</span></label>
                        <input type="text" class="form-control" id="nationalCode" th:field="*{nationalCode}" maxlength="10" pattern="[0-9]{10}" placeholder="۱۰ رقم" required>
                        <div th:if="${#fields.hasErrors('nationalCode')}" style="margin-top:0.35rem;font-size:0.8rem;color:var(--red);">
                            <i class="bi bi-exclamation-circle"></i> <small th:errors="*{nationalCode}"></small>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">موبایل</label>
                        <input type="text" class="form-control" id="mobile" th:field="*{mobile}" maxlength="11" pattern="09[0-9]{9}" placeholder="09xxxxxxxxx">
                        <div th:if="${#fields.hasErrors('mobile')}" style="margin-top:0.35rem;font-size:0.8rem;color:var(--red);">
                            <i class="bi bi-exclamation-circle"></i> <small th:errors="*{mobile}"></small>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">ایمیل</label>
                        <input type="email" class="form-control" id="email" th:field="*{email}" placeholder="example@domain.com">
                        <div th:if="${#fields.hasErrors('email')}" style="margin-top:0.35rem;font-size:0.8rem;color:var(--red);">
                            <i class="bi bi-exclamation-circle"></i> <small th:errors="*{email}"></small>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">دپارتمان <span style="color:var(--red);">*</span></label>
                        <select class="form-select" id="departmentId" th:field="*{departmentId}" required>
                            <option value="">انتخاب دپارتمان...</option>
                            <option th:each="dept : ${departments}" th:value="${dept.id}" th:text="${dept.name}"></option>
                        </select>
                        <div th:if="${#fields.hasErrors('departmentId')}" style="margin-top:0.35rem;font-size:0.8rem;color:var(--red);">
                            <i class="bi bi-exclamation-circle"></i> <small th:errors="*{departmentId}"></small>
                        </div>
                    </div>
                    <div class="col-12">
                        <div style="background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:1rem;">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="active" th:field="*{active}" checked>
                                <label class="form-check-label" for="active">
                                    <span style="font-weight:600;color:var(--t1);">کاربر فعال</span>
                                    <span style="display:block;font-size:0.8rem;color:var(--t3);">این شخص می‌تواند به سیستم دسترسی داشته باشد</span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <div style="display:flex;justify-content:flex-end;gap:0.75rem;margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border);">
                    <a href="/persons" class="btn btn-secondary">انصراف</a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-circle-fill"></i> ذخیره شخص
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
