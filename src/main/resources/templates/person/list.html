<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::content})}">
<body>
<div th:fragment="content">

    <div class="page-header">
        <div class="page-title">
            <div class="title-icon"><i class="bi bi-people-fill"></i></div>
            لیست اشخاص
        </div>
        <a href="/persons/create" class="btn btn-primary">
            <i class="bi bi-plus-circle-fill"></i> افزودن شخص جدید
        </a>
    </div>

    <div class="card">
        <div class="card-header">
            <form th:action="@{/persons}" method="get" style="display:flex;gap:0.75rem;flex-wrap:wrap;align-items:flex-end;">
                <div style="flex:1;min-width:140px;">
                    <label class="filter-label">نام</label>
                    <input type="text" class="form-control" name="firstName" th:value="${firstName}" placeholder="جستجوی نام...">
                </div>
                <div style="flex:1;min-width:140px;">
                    <label class="filter-label">نام خانوادگی</label>
                    <input type="text" class="form-control" name="lastName" th:value="${lastName}" placeholder="جستجوی نام خانوادگی...">
                </div>
                <div style="flex:1;min-width:140px;">
                    <label class="filter-label">کد ملی</label>
                    <input type="text" class="form-control" name="nationalCode" th:value="${nationalCode}" placeholder="کد ملی...">
                </div>
                <div style="display:flex;gap:0.5rem;flex-shrink:0;">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-search"></i> جستجو
                    </button>
                    <a href="/persons" class="btn btn-secondary">
                        <i class="bi bi-x-circle"></i>
                    </a>
                </div>
            </form>
        </div>
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                <tr>
                    <th>#</th>
                    <th>نام و نام خانوادگی</th>
                    <th>کد ملی</th>
                    <th>ایمیل</th>
                    <th>موبایل</th>
                    <th>دپارتمان</th>
                    <th>وضعیت</th>
                    <th style="text-align:center;">عملیات</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="person, stat : ${persons}">
                    <td style="color:var(--t3);font-size:0.8rem;" th:text="${stat.index + 1}"></td>
                    <td>
                        <div style="display:flex;align-items:center;gap:0.6rem;">
                            <div class="row-avatar" th:text="${#strings.substring(person.firstName, 0, 1)}"></div>
                            <span style="font-weight:600;color:var(--t1);" th:text="${person.firstName + ' ' + person.lastName}"></span>
                        </div>
                    </td>
                    <td style="font-family:monospace;" th:text="${person.nationalCode}"></td>
                    <td th:text="${person.email}"></td>
                    <td style="direction:ltr;text-align:left;" th:text="${person.mobile}"></td>
                    <td>
                        <span class="dept-badge" th:text="${person.departmentName}"></span>
                    </td>
                    <td>
                        <span th:if="${person.active}" class="status-badge active">فعال</span>
                        <span th:unless="${person.active}" class="status-badge inactive">غیرفعال</span>
                    </td>
                    <td>
                        <div class="action-btns">
                            <a th:href="@{/persons/view/{id}(id=${person.id})}" class="action-btn view" title="مشاهده">
                                <i class="bi bi-eye-fill"></i>
                            </a>
                            <a th:href="@{/persons/edit/{id}(id=${person.id})}" class="action-btn edit" title="ویرایش">
                                <i class="bi bi-pencil-fill"></i>
                            </a>
                            <a th:href="@{/persons/delete/{id}(id=${person.id})}" class="action-btn delete" title="حذف"
                               onclick="return confirm('آیا از حذف این شخص اطمینان دارید؟')">
                                <i class="bi bi-trash-fill"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(persons)}">
                    <td colspan="8" class="empty-state">
                        <i class="bi bi-inbox"></i>
                        هیچ شخصی یافت نشد
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <style>
        .filter-label { font-size:0.78rem;font-weight:600;color:var(--t3);display:block;margin-bottom:0.35rem;text-transform:uppercase;letter-spacing:0.05em; }
        .row-avatar { width:32px;height:32px;background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.78rem;font-weight:700;color:#60A5FA;flex-shrink:0; }
        .dept-badge { background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);color:#818CF8;padding:0.25rem 0.625rem;border-radius:6px;font-size:0.78rem;font-weight:600; }
        .status-badge { padding:0.25rem 0.75rem;border-radius:20px;font-size:0.75rem;font-weight:700; }
        .status-badge.active { background:rgba(16,185,129,0.12);color:#10B981;border:1px solid rgba(16,185,129,0.25); }
        .status-badge.inactive { background:rgba(239,68,68,0.12);color:#EF4444;border:1px solid rgba(239,68,68,0.25); }
        .action-btns { display:flex;gap:0.4rem;justify-content:center; }
        .action-btn { width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.85rem;text-decoration:none;transition:all 0.2s;flex-shrink:0; }
        .action-btn.view  { background:rgba(6,182,212,0.12);color:#06B6D4;border:1px solid rgba(6,182,212,0.25); }
        .action-btn.edit  { background:rgba(245,158,11,0.12);color:#F59E0B;border:1px solid rgba(245,158,11,0.25); }
        .action-btn.delete{ background:rgba(239,68,68,0.12);color:#EF4444;border:1px solid rgba(239,68,68,0.25); }
        .action-btn.view:hover  { background:rgba(6,182,212,0.25);transform:translateY(-2px); }
        .action-btn.edit:hover  { background:rgba(245,158,11,0.25);transform:translateY(-2px); }
        .action-btn.delete:hover{ background:rgba(239,68,68,0.25);transform:translateY(-2px); }
        .empty-state { text-align:center;padding:3rem;color:var(--t3); }
        .empty-state i { font-size:2rem;display:block;margin-bottom:0.5rem; }
    </style>

</div>
</body>
</html>
