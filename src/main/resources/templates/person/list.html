<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::content})}">
<body>
<div th:fragment="content">
    <div class="page-header">
        <div class="page-title">
            <div class="title-icon"><i class="bi bi-people-fill"></i></div>
            لیست اشخاص
        </div>
        <a href="/persons/create" class="btn btn-primary">
            <i class="bi bi-plus-circle-fill"></i> افزودن شخص جدید
        </a>
    </div>

    <div class="card">
        <div class="card-header">
            <form th:action="@{/persons}" method="get" style="display:flex;gap:0.75rem;flex-wrap:wrap;align-items:flex-end;">
                <div style="flex:1;min-width:140px;">
                    <label style="font-size:0.78rem;font-weight:600;color:var(--t3);display:block;margin-bottom:0.35rem;text-transform:uppercase;letter-spacing:0.05em;">نام</label>
                    <input type="text" class="form-control" name="firstName" th:value="${firstName}" placeholder="جستجوی نام...">
                </div>
                <div style="flex:1;min-width:140px;">
                    <label style="font-size:0.78rem;font-weight:600;color:var(--t3);display:block;margin-bottom:0.35rem;text-transform:uppercase;letter-spacing:0.05em;">نام خانوادگی</label>
                    <input type="text" class="form-control" name="lastName" th:value="${lastName}" placeholder="جستجوی نام خانوادگی...">
                </div>
                <div style="flex:1;min-width:140px;">
                    <label style="font-size:0.78rem;font-weight:600;color:var(--t3);display:block;margin-bottom:0.35rem;text-transform:uppercase;letter-spacing:0.05em;">کد ملی</label>
                    <input type="text" class="form-control" name="nationalCode" th:value="${nationalCode}" placeholder="کد ملی...">
                </div>
                <button type="submit" class="btn btn-outline-primary" style="flex-shrink:0;">
                    <i class="bi bi-search"></i> جستجو
                </button>
            </form>
        </div>
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                <tr>
                    <th>#</th>
                    <th>نام و نام خانوادگی</th>
                    <th>کد ملی</th>
                    <th>ایمیل</th>
                    <th>موبایل</th>
                    <th>دپارتمان</th>
                    <th>وضعیت</th>
                    <th>عملیات</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="person : ${persons}">
                    <td style="color:var(--t3);font-size:0.8rem;" th:text="${person.id}"></td>
                    <td>
                        <div style="display:flex;align-items:center;gap:0.6rem;">
                            <div style="width:32px;height:32px;background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;color:#60A5FA;flex-shrink:0;">
                                <span th:text="${#strings.substring(person.firstName, 0, 1)}">ک</span>
                            </div>
                            <div>
                                <div style="font-weight:600;color:var(--t1);font-size:0.875rem;" th:text="${person.firstName + ' ' + person.lastName}"></div>
                            </div>
                        </div>
                    </td>
                    <td style="font-family:monospace;font-size:0.875rem;" th:text="${person.nationalCode}"></td>
                    <td th:text="${person.email}"></td>
                    <td style="direction:ltr;text-align:left;" th:text="${person.mobile}"></td>
                    <td>
                        <span style="background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);color:#818CF8;padding:0.25rem 0.625rem;border-radius:6px;font-size:0.78rem;font-weight:600;" th:text="${person.departmentName}"></span>
                    </td>
                    <td>
                        <span th:if="${person.active}" class="badge bg-success">فعال</span>
                        <span th:unless="${person.active}" class="badge bg-danger">غیرفعال</span>
                    </td>
                    <td>
                        <div style="display:flex;gap:0.35rem;">
                            <a th:href="@{/persons/view/{id}(id=${person.id})}" class="btn btn-info btn-sm" title="مشاهده">
                                <i class="bi bi-eye"></i>
                            </a>
                            <a th:href="@{/persons/edit/{id}(id=${person.id})}" class="btn btn-warning btn-sm" title="ویرایش">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/persons/delete/{id}(id=${person.id})}" class="btn btn-danger btn-sm" title="حذف"
                               onclick="return confirm('آیا از حذف این شخص اطمینان دارید؟')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(persons)}">
                    <td colspan="8" style="text-align:center;padding:3rem;color:var(--t3);">
                        <i class="bi bi-inbox" style="font-size:2rem;display:block;margin-bottom:0.5rem;"></i>
                        هیچ شخصی یافت نشد
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
