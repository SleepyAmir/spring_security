<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جزییات حساب بانکی</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg0: #080C16;
            --bg1: #0D1120;
            --bg2: #111827;
            --bg3: #161F30;
            --glass: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.07);
            --border2: rgba(99,179,237,0.22);
            --blue: #3B82F6;
            --blue2: #60A5FA;
            --green: #10B981;
            --yellow: #F59E0B;
            --red: #EF4444;
            --cyan: #06B6D4;
            --t1: #EFF6FF;
            --t2: #94A3B8;
            --t3: #4B5675;
            --g1: linear-gradient(135deg, #1D4ED8, #2563EB);
            --sh: 0 4px 24px rgba(0,0,0,0.5);
            --r: 14px;
            --rs: 8px;
            --tr: all 0.25s cubic-bezier(0.4,0,0.2,1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background: var(--bg0);
            color: var(--t1);
            direction: rtl;
            text-align: right;
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(59,130,246,0.06) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 10%, rgba(16,185,129,0.04) 0%, transparent 50%);
        }

        /* ─── TOP BAR ─── */
        .top-bar {
            background: rgba(8,12,22,0.96);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
            gap: 1rem;
        }
        .top-bar-brand {
            font-weight: 800;
            font-size: 1rem;
            color: var(--t1);
            display: flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
        }
        .brand-logo {
            width: 32px; height: 32px;
            background: var(--g1);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem;
            color: white;
        }
        .top-bar-actions {
            margin-right: auto;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* ─── MAIN ─── */
        .page-wrap {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            animation: fadeInUp 0.4s ease forwards;
        }

        /* ─── PAGE HEADER ─── */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .page-title {
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--t1);
            display: flex;
            align-items: center;
            gap: 0.6rem;
            letter-spacing: -0.02em;
        }
        .title-icon {
            width: 38px; height: 38px;
            background: rgba(59,130,246,0.1);
            border: 1px solid rgba(59,130,246,0.22);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem;
            color: var(--blue);
        }

        /* ─── ACCOUNT HERO CARD ─── */
        .account-hero {
            background: linear-gradient(135deg, rgba(29,78,216,0.25) 0%, rgba(16,185,129,0.08) 100%);
            border: 1px solid rgba(59,130,246,0.2);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            position: relative;
            overflow: hidden;
        }
        .account-hero::before {
            content: "";
            position: absolute;
            top: -40px; left: -40px;
            width: 160px; height: 160px;
            background: rgba(59,130,246,0.08);
            border-radius: 50%;
        }
        .account-hero::after {
            content: "";
            position: absolute;
            bottom: -30px; right: 60px;
            width: 100px; height: 100px;
            background: rgba(16,185,129,0.06);
            border-radius: 50%;
        }
        .hero-content {
            position: relative;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .account-avatar {
            width: 72px; height: 72px;
            background: var(--g1);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.75rem;
            color: white;
            box-shadow: 0 8px 24px rgba(59,130,246,0.35);
            flex-shrink: 0;
        }
        .hero-info { flex: 1; min-width: 200px; }
        .hero-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: rgba(96,165,250,0.7);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.35rem;
        }
        .hero-account-num {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--t1);
            font-family: 'Courier New', monospace;
            letter-spacing: 0.04em;
            margin-bottom: 0.25rem;
        }
        .hero-type {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: rgba(59,130,246,0.12);
            border: 1px solid rgba(59,130,246,0.25);
            color: var(--blue2);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .hero-balance-wrap { text-align: left; }
        .balance-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--t3);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.25rem;
        }
        .balance-amount {
            font-size: 2rem;
            font-weight: 800;
            color: var(--green);
            letter-spacing: -0.03em;
            line-height: 1;
        }
        .balance-currency {
            font-size: 0.875rem;
            color: var(--t3);
            margin-top: 0.2rem;
        }

        /* ─── INFO CARDS ─── */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        @media (max-width: 600px) {
            .info-grid { grid-template-columns: 1fr; }
        }

        .info-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 1.25rem 1.5rem;
            transition: var(--tr);
        }
        .info-card:hover {
            border-color: var(--border2);
            transform: translateY(-2px);
        }
        .info-card-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--t3);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .info-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.625rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            gap: 1rem;
        }
        .info-row:last-child { border-bottom: none; }
        .info-key {
            font-size: 0.835rem;
            color: var(--t3);
            font-weight: 500;
            flex-shrink: 0;
        }
        .info-val {
            font-size: 0.875rem;
            color: var(--t1);
            font-weight: 600;
            text-align: left;
            word-break: break-all;
        }
        .info-val.mono {
            font-family: 'Courier New', monospace;
            font-size: 0.82rem;
            color: var(--blue2);
        }

        /* ─── STATUS BADGE ─── */
        .status-active {
            background: rgba(16,185,129,0.12);
            border: 1px solid rgba(16,185,129,0.25);
            color: #10B981;
            padding: 0.2rem 0.65rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        /* ─── ACTION BUTTONS ─── */
        .actions-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 1.25rem 1.5rem;
            margin-bottom: 1rem;
        }
        .actions-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--t3);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .actions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 0.75rem;
        }

        /* ─── BUTTONS ─── */
        .btn {
            font-family: 'Vazirmatn', sans-serif;
            font-weight: 600;
            border-radius: var(--rs);
            font-size: 0.875rem;
            transition: var(--tr);
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            text-decoration: none;
            padding: 0.7rem 1.25rem;
        }
        .btn-primary { background: var(--g1); color: white; box-shadow: 0 4px 16px rgba(59,130,246,0.32); }
        .btn-primary:hover { transform: translateY(-2px); color: white; filter: brightness(1.1); }
        .btn-secondary { background: var(--glass); color: var(--t2); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--bg3); color: var(--t1); transform: translateY(-1px); }
        .btn-danger { background: linear-gradient(135deg,#7F1D1D,#DC2626); color: white; }
        .btn-danger:hover { transform: translateY(-2px); color: white; }
        .btn-warning { background: linear-gradient(135deg,#92400E,#D97706); color: white; }
        .btn-warning:hover { transform: translateY(-2px); color: white; }

        /* ─── ALERT ─── */
        .alert {
            border-radius: var(--r);
            border: 1px solid;
            font-size: 0.875rem;
            font-weight: 500;
            padding: 0.875rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .alert-success { background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.25); color: #34D399; }
        .alert-danger  { background: rgba(239,68,68,0.1);  border-color: rgba(239,68,68,0.25);  color: #F87171; }
        .btn-close { filter: invert(1) brightness(0.5); cursor: pointer; margin-right: auto; }

        /* ─── ANIMATION ─── */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
    <a class="top-bar-brand" href="/dashboard">
        <div class="brand-logo"><i class="bi bi-shield-fill-check"></i></div>
        سیستم مدیریت
    </a>
    <div class="top-bar-actions">
        <a href="/profile" class="btn btn-secondary" style="padding:0.4rem 0.875rem;font-size:0.835rem;">
            <i class="bi bi-person-circle"></i> پروفایل
        </a>
        <a href="/bankAccount" class="btn btn-secondary" style="padding:0.4rem 0.875rem;font-size:0.835rem;">
            <i class="bi bi-bank2"></i> همه حساب‌ها
        </a>
    </div>
</div>

<!-- MAIN CONTENT -->
<div class="page-wrap">

    <!-- PAGE HEADER -->
    <div class="page-header">
        <div class="page-title">
            <div class="title-icon"><i class="bi bi-credit-card-2-front"></i></div>
            جزییات حساب بانکی
        </div>
        <a href="/profile" class="btn btn-secondary">
            <i class="bi bi-arrow-right"></i> بازگشت
        </a>
    </div>

    <!-- ALERTS -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle-fill"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- ACCOUNT HERO -->
    <div class="account-hero">
        <div class="hero-content">
            <div class="account-avatar">
                <i class="bi bi-credit-card-fill"></i>
            </div>
            <div class="hero-info">
                <div class="hero-label">شماره حساب</div>
                <div class="hero-account-num" th:text="${account.accountNumber}">6037-XXXX-XXXX-XXXX</div>
                <span class="hero-type">
                    <i class="bi bi-tag-fill"></i>
                    <span th:text="${account.type == 'SAVINGS'} ? 'حساب پس‌انداز' : 'حساب جاری'"></span>
                </span>
            </div>
            <div class="hero-balance-wrap">
                <div class="balance-label">موجودی فعلی</div>
                <div class="balance-amount"
                     th:text="${#numbers.formatDecimal(account.balance, 0, 'COMMA', 0, 'POINT')}">
                    0
                </div>
                <div class="balance-currency">ریال ایران</div>
            </div>
        </div>
    </div>

    <!-- INFO GRID -->
    <div class="info-grid">

        <!-- اطلاعات حساب -->
        <div class="info-card">
            <div class="info-card-title">
                <i class="bi bi-info-circle" style="color:var(--blue);"></i>
                اطلاعات حساب
            </div>
            <div class="info-row">
                <span class="info-key">شناسه</span>
                <span class="info-val mono" th:text="'#' + ${account.id}"></span>
            </div>
            <div class="info-row">
                <span class="info-key">شماره حساب</span>
                <span class="info-val mono" th:text="${account.accountNumber}"></span>
            </div>
            <div class="info-row">
                <span class="info-key">نوع حساب</span>
                <span class="info-val"
                      th:text="${account.type == 'SAVINGS'} ? 'پس‌انداز' : 'جاری'"></span>
            </div>
            <div class="info-row">
                <span class="info-key">وضعیت</span>
                <span class="status-active">فعال</span>
            </div>
        </div>

        <!-- اطلاعات صاحب حساب -->
        <div class="info-card">
            <div class="info-card-title">
                <i class="bi bi-person-fill" style="color:var(--cyan);"></i>
                صاحب حساب
            </div>
            <div class="info-row">
                <span class="info-key">شناسه کاربر</span>
                <span class="info-val mono" th:text="'#' + ${account.userId}"></span>
            </div>
            <div class="info-row">
                <span class="info-key">نام کاربری</span>
                <span class="info-val" th:text="${account.username}"></span>
            </div>
            <div class="info-row">
                <span class="info-key">نام کامل</span>
                <span class="info-val" th:text="${account.userFullName ?: '---'}"></span>
            </div>
            <div class="info-row">
                <span class="info-key">موجودی</span>
                <span class="info-val" style="color:var(--green);font-weight:700;"
                      th:text="${#numbers.formatDecimal(account.balance, 0, 'COMMA', 0, 'POINT')} + ' ریال'">
                </span>
            </div>
        </div>

    </div>

    <!-- ACTION BUTTONS -->
    <div class="actions-card">
        <div class="actions-title">
            <i class="bi bi-lightning-fill" style="color:var(--yellow);"></i>
            عملیات
        </div>
        <div class="actions-grid">

            <!-- ویرایش نوع حساب - فرم PUT -->
            <form th:action="@{/bankAccount/{id}(id=${account.id})}"
                  method="post"
                  style="display:contents;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="_method" value="PUT"/>
                <!-- نوع فعلی را نگه می‌دارد -->
                <input type="hidden" name="type" th:value="${account.type}"/>
                <button type="submit" class="btn btn-warning">
                    <i class="bi bi-pencil-fill"></i> ویرایش حساب
                </button>
            </form>

            <!-- حذف حساب -->
            <form th:action="@{/bankAccount/{id}(id=${account.id})}"
                  method="post"
                  onsubmit="return confirm('آیا از حذف این حساب اطمینان دارید؟')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="_method" value="DELETE"/>
                <button type="submit" class="btn btn-danger" style="width:100%;">
                    <i class="bi bi-trash-fill"></i> حذف حساب
                </button>
            </form>

            <!-- بازگشت به پروفایل -->
            <a href="/profile" class="btn btn-secondary">
                <i class="bi bi-person-circle"></i> پروفایل من
            </a>

            <!-- لیست همه حساب‌ها -->
            <a href="/bankAccount" class="btn btn-secondary">
                <i class="bi bi-list-ul"></i> همه حساب‌ها
            </a>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
