<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ویرایش حساب بانکی</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg0: #080C16; --bg1: #0D1120; --bg2: #111827; --bg3: #161F30;
            --glass: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.07);
            --border2: rgba(99,179,237,0.22); --blue: #3B82F6; --blue2: #60A5FA;
            --green: #10B981; --t1: #EFF6FF; --t2: #94A3B8; --t3: #4B5675;
            --g1: linear-gradient(135deg, #1D4ED8, #2563EB);
            --sh: 0 4px 24px rgba(0,0,0,0.5); --r: 14px; --rs: 8px;
            --tr: all 0.25s cubic-bezier(0.4,0,0.2,1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Vazirmatn', sans-serif;
            background: var(--bg0); color: var(--t1);
            direction: rtl; text-align: right; min-height: 100vh;
        }
        .top-bar {
            background: rgba(8,12,22,0.96); backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border); height: 60px;
            display: flex; align-items: center; padding: 0 1.5rem;
            position: sticky; top: 0; z-index: 100; gap: 1rem;
        }
        .top-bar-brand {
            font-weight: 800; font-size: 1rem; color: var(--t1);
            display: flex; align-items: center; gap: 0.6rem; text-decoration: none;
        }
        .brand-logo {
            width: 32px; height: 32px; background: var(--g1);
            border-radius: 8px; display: flex; align-items: center;
            justify-content: center; font-size: 0.85rem; color: white;
        }
        .top-bar-actions { margin-right: auto; display: flex; align-items: center; gap: 0.5rem; }
        .page-wrap { max-width: 600px; margin: 0 auto; padding: 2rem 1.5rem; }
        .page-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 2rem;
        }
        .page-title {
            font-size: 1.35rem; font-weight: 800; color: var(--t1);
            display: flex; align-items: center; gap: 0.6rem;
        }
        .title-icon {
            width: 38px; height: 38px; background: rgba(245,158,11,0.1);
            border: 1px solid rgba(245,158,11,0.22); border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; color: #F59E0B;
        }
        .card {
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: var(--r); box-shadow: var(--sh);
        }
        .card-header {
            background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border);
            padding: 1.2rem 1.5rem; display: flex; align-items: center; gap: 0.5rem;
        }
        .card-body { padding: 1.75rem; }
        .form-label {
            font-size: 0.845rem; font-weight: 600; color: var(--t2);
            margin-bottom: 0.45rem; display: block;
        }
        .form-select {
            background: var(--bg1); border: 1px solid var(--border);
            border-radius: var(--rs); color: var(--t1);
            font-family: 'Vazirmatn', sans-serif; font-size: 0.9rem;
            padding: 0.75rem 1rem; width: 100%; outline: none;
            transition: var(--tr);
        }
        .form-select:focus {
            border-color: var(--blue); background: var(--bg2);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.14);
        }
        .form-select option { background: var(--bg2); color: var(--t1); }
        .info-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.75rem 1rem; background: rgba(255,255,255,0.02);
            border: 1px solid var(--border); border-radius: 10px;
            margin-bottom: 1.25rem;
        }
        .info-key { font-size: 0.835rem; color: var(--t3); font-weight: 500; }
        .info-val { font-size: 0.875rem; color: var(--t1); font-weight: 600; font-family: monospace; }
        .btn {
            font-family: 'Vazirmatn', sans-serif; font-weight: 600;
            border-radius: var(--rs); font-size: 0.875rem; transition: var(--tr);
            border: none; cursor: pointer; display: inline-flex;
            align-items: center; gap: 0.4rem; text-decoration: none; padding: 0.7rem 1.25rem;
        }
        .btn-warning { background: linear-gradient(135deg,#92400E,#D97706); color: white; }
        .btn-warning:hover { transform: translateY(-2px); color: white; filter: brightness(1.1); }
        .btn-secondary { background: var(--glass); color: var(--t2); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--bg3); color: var(--t1); }
        .alert {
            border-radius: var(--r); border: 1px solid; font-size: 0.875rem;
            font-weight: 500; padding: 0.875rem 1rem;
            display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem;
        }
        .alert-danger { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.25); color: #F87171; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .page-wrap { animation: fadeInUp 0.4s ease forwards; }
    </style>
</head>
<body>

<div class="top-bar">
    <a class="top-bar-brand" href="/dashboard">
        <div class="brand-logo"><i class="bi bi-shield-fill-check"></i></div>
        سیستم مدیریت
    </a>
    <div class="top-bar-actions">
        <a th:href="@{/bankAccount/{id}(id=${bankAccount.id})}" class="btn btn-secondary"
           style="padding:0.4rem 0.875rem;font-size:0.835rem;">
            <i class="bi bi-arrow-right"></i> بازگشت
        </a>
    </div>
</div>

<div class="page-wrap">
    <div class="page-header">
        <div class="page-title">
            <div class="title-icon"><i class="bi bi-pencil-fill"></i></div>
            ویرایش حساب بانکی
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <i class="bi bi-credit-card" style="color:var(--blue);"></i>
            <span style="font-size:0.875rem;font-weight:600;color:var(--t2);">اطلاعات حساب</span>
        </div>
        <div class="card-body">

            <!-- نمایش اطلاعات غیرقابل ویرایش -->
            <div class="info-row">
                <span class="info-key"><i class="bi bi-hash"></i> شماره حساب</span>
                <span class="info-val" th:text="${bankAccount.accountNumber}"></span>
            </div>
            <div class="info-row">
                <span class="info-key"><i class="bi bi-wallet2"></i> موجودی</span>
                <span class="info-val" style="color:var(--green);"
                      th:text="${#numbers.formatDecimal(bankAccount.balance, 0, 'COMMA', 0, 'POINT')} + ' ریال'">
                </span>
            </div>

            <!-- فرم ویرایش -->
            <form th:action="@{/bankAccount/{id}/edit(id=${bankAccount.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div style="margin-bottom: 1.5rem;">
                    <label class="form-label">نوع حساب <span style="color:#EF4444;">*</span></label>
                    <select class="form-select" name="type" required>
                        <option value="SAVINGS"
                                th:selected="${bankAccount.type != null && bankAccount.type.name() == 'SAVINGS'}">
                            💰 حساب پس‌انداز (Savings)
                        </option>
                        <option value="CHECKING"
                                th:selected="${bankAccount.type != null && bankAccount.type.name() == 'CHECKING'}">
                            🏦 حساب جاری (Checking)
                        </option>
                    </select>
                </div>

                <div style="display:flex; justify-content:flex-end; gap:0.75rem; padding-top:1rem; border-top:1px solid var(--border);">
                    <a th:href="@{/bankAccount/{id}(id=${bankAccount.id})}" class="btn btn-secondary">
                        انصراف
                    </a>
                    <button type="submit" class="btn btn-warning">
                        <i class="bi bi-check-circle-fill"></i> ذخیره تغییرات
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
