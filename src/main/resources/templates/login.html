<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود به سیستم</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg0: #080C16;
            --bg2: #111827;
            --border: rgba(255,255,255,0.07);
            --border2: rgba(99,179,237,0.22);
            --blue: #3B82F6;
            --t1: #EFF6FF;
            --t2: #94A3B8;
            --t3: #4B5675;
            --g1: linear-gradient(135deg,#1D4ED8,#2563EB);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Vazirmatn',sans-serif;
            direction: rtl; text-align: right;
            min-height: 100vh;
            background: var(--bg0);
            background-image:
                    radial-gradient(ellipse at 30% 50%, rgba(59,130,246,0.12) 0%, transparent 50%),
                    radial-gradient(ellipse at 75% 20%, rgba(99,102,241,0.08) 0%, transparent 45%),
                    radial-gradient(ellipse at 60% 80%, rgba(6,182,212,0.06) 0%, transparent 40%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .login-wrap {
            width: 100%;
            max-width: 420px;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo-icon {
            width: 64px; height: 64px;
            background: var(--g1);
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            color: white;
            box-shadow: 0 8px 32px rgba(59,130,246,0.4);
            margin-bottom: 1rem;
        }
        .login-title {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--t1);
            letter-spacing: -0.03em;
            margin-bottom: 0.25rem;
        }
        .login-sub {
            font-size: 0.875rem;
            color: var(--t3);
        }

        .login-card {
            background: rgba(17,24,39,0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
        }

        .form-group { margin-bottom: 1.25rem; }
        .form-label { font-size: 0.845rem; font-weight: 600; color: var(--t2); margin-bottom: 0.45rem; display: block; }
        .input-wrap { position: relative; }
        .input-icon { position: absolute; right: 0.9rem; top: 50%; transform: translateY(-50%); color: var(--t3); font-size: 1rem; pointer-events: none; }
        .form-input {
            width: 100%;
            background: rgba(13,17,32,0.8);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--t1);
            font-family: 'Vazirmatn',sans-serif;
            font-size: 0.9rem;
            padding: 0.75rem 2.6rem 0.75rem 1rem;
            transition: all 0.25s;
            outline: none;
        }
        .form-input:focus {
            border-color: var(--blue);
            background: rgba(17,24,39,0.9);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.14);
        }
        .form-input::placeholder { color: var(--t3); }

        .btn-login {
            width: 100%;
            background: var(--g1);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 0.875rem;
            font-family: 'Vazirmatn',sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 4px 20px rgba(59,130,246,0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(59,130,246,0.5); filter: brightness(1.1); }
        .btn-login:active { transform: translateY(0); }

        .alert {
            border-radius: 10px;
            border: 1px solid;
            font-size: 0.875rem;
            font-weight: 500;
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
        }
        .alert-danger { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.25); color: #F87171; }
        .alert-success { background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.25); color: #34D399; }
        .alert-warning { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.25); color: #FCD34D; }

        .login-hint {
            margin-top: 1.5rem;
            padding-top: 1.25rem;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: var(--t3);
        }
        .hint-badge {
            background: rgba(59,130,246,0.1);
            border: 1px solid rgba(59,130,246,0.2);
            border-radius: 6px;
            padding: 0.15rem 0.5rem;
            font-family: monospace;
            color: #60A5FA;
            font-size: 0.8rem;
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
        .login-wrap { animation: fadeInUp 0.5s ease forwards; }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="login-logo">
        <div class="logo-icon"><i class="bi bi-shield-fill-check"></i></div>
        <div class="login-title">ورود به سیستم</div>
        <div class="login-sub">لطفا اطلاعات خود را وارد کنید</div>
    </div>

    <div class="login-card">
        <div th:if="${param.error}" class="alert alert-danger">
            <i class="bi bi-exclamation-circle-fill"></i> نام کاربری یا رمز عبور اشتباه است
        </div>
        <div th:if="${param.logout}" class="alert alert-success">
            <i class="bi bi-check-circle-fill"></i> با موفقیت خارج شدید
        </div>
        <div th:if="${param.expired}" class="alert alert-warning">
            <i class="bi bi-clock-history"></i> نشست شما منقضی شده است. لطفا دوباره وارد شوید
        </div>

        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label class="form-label" for="username">نام کاربری</label>
                <div class="input-wrap">
                    <i class="bi bi-person input-icon"></i>
                    <input type="text" class="form-input" id="username" name="username" placeholder="نام کاربری خود را وارد کنید" required autofocus>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">رمز عبور</label>
                <div class="input-wrap">
                    <i class="bi bi-lock input-icon"></i>
                    <input type="password" class="form-input" id="password" name="password" placeholder="رمز عبور خود را وارد کنید" required>
                </div>
            </div>

            <button type="submit" class="btn-login">
                <i class="bi bi-box-arrow-in-right"></i>
                ورود به سیستم
            </button>
        </form>

        <div class="login-hint">
            <i class="bi bi-info-circle" style="color:var(--blue);"></i>
            پیش‌فرض:
            <span class="hint-badge">admin</span>
            /
            <span class="hint-badge">admin123</span>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
