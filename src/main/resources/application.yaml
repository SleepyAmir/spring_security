spring:
  application:
    name: spring_security
  
  # H2 In-Memory Database (بدون نیاز به MySQL)
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: create-drop  # هر بار که برنامه run میشه، جداول از نو ساخته میشن
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  # H2 Console - برای دیدن دیتابیس
  h2:
    console:
      enabled: true
      path: /h2-console

  # Cache Configuration
  cache:
    type: simple
    cache-names:
      - departments

  # Thymeleaf Configuration
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

# Server Configuration
server:
  port: 8080
  servlet:
    session:
      cookie:
        http-only: true
        secure: false
        same-site: strict
      timeout: 30m

# Logging Configuration
logging:
  level:
    com.mftplus.spring_security: DEBUG
    org.springframework.security: DEBUG
    sql: debug

# نکته: برای دیدن دیتابیس به آدرس زیر برید:
# http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:testdb
# Username: sa
# Password: (خالی بگذارید)