spring:
  application:
    name: spring_security
  
  # MySQL Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/mft
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
#    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  
  # H2 Database Configuration for Caching Department
  h2:
    console:
      enabled: true
      path: /h2-console
  
  # Cache Configuration
  cache:
    type: simple
    cache-names:
      - departments
  
  # Thymeleaf Configuration
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

# Server Configuration
server:
  port: 8080
  servlet:
    session:
      cookie:
        http-only: true
        secure: false
        same-site: strict
      timeout: 30m

# Logging Configuration
logging:
  level:
    com.mftplus.spring_security: DEBUG
    org.springframework.security: DEBUG
    sql: debug